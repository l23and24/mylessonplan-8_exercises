
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вправа №37.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        .scale-mark { stroke: #333; stroke-width: 1.5; }
        .scale-mark-long { stroke: #000; stroke-width: 3; }
        .needle { 
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: 100px 140px;
        }
        .switch-arm {
            transition: transform 0.4s ease;
            transform-origin: 40px 115px;
        }
        .wire { stroke: #1e293b; stroke-width: 3.5; fill: none; }
        .component-box { fill: white; stroke: #1e293b; stroke-width: 3; }
        .circuit-bg { fill: #e0f2fe; }
        /* Покращення для смарт-дощок: більші зони натискання */
        input[type="number"] {
            font-size: 1.5rem !important;
            height: 4rem !important;
        }
        button {
            touch-action: manipulation;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-2 sm:p-6 font-sans select-none">

    <div class="max-w-5xl w-full bg-white rounded-3xl shadow-2xl p-6 sm:p-10 border-2 border-gray-200">
        <h1 class="text-3xl sm:text-4xl font-black text-gray-800 mb-8 text-center border-b-4 border-blue-500 pb-4 inline-block w-full">Вправа №37.5</h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-10">
            <!-- Left Side: Circuit Diagram -->
            <div class="bg-white rounded-2xl p-6 flex flex-col items-center justify-center border-2 border-gray-100 relative shadow-inner">
                <span class="absolute top-3 left-6 text-sm font-bold text-gray-400 uppercase tracking-widest">Електрична схема</span>
                <svg viewBox="0 0 300 220" class="w-full h-auto max-w-[450px]">
                    <!-- Colored background for the main part -->
                    <rect x="20" y="20" width="220" height="180" class="circuit-bg" rx="4" />

                    <!-- Battery (Top) -->
                    <line x1="135" y1="40" x2="135" y2="20" class="wire" />
                    <line x1="145" y1="35" x2="145" y2="25" class="wire" />
                    <line x1="155" y1="40" x2="155" y2="20" class="wire" />
                    <line x1="165" y1="35" x2="165" y2="25" class="wire" />
                    <path d="M 148 30 L 152 30" stroke="#000" stroke-width="2" stroke-dasharray="2,2" />

                    <!-- Main wires -->
                    <path d="M 135 30 L 40 30 L 40 80" class="wire" />
                    <path d="M 165 30 L 260 30 L 260 90" class="wire" />
                    
                    <!-- Switch -->
                    <circle cx="40" cy="80" r="3" fill="#000" />
                    <circle cx="40" cy="115" r="3" fill="#000" />
                    <line id="switchArm" x1="40" y1="115" x2="20" y2="80" class="wire switch-arm" />
                    <line x1="40" y1="115" x2="40" y2="150" class="wire" />

                    <!-- Ammeter in circuit -->
                    <circle cx="260" cy="110" r="20" class="component-box" />
                    <text x="253" y="117" font-weight="900" font-size="16">A</text>
                    <line x1="260" y1="130" x2="260" y2="150" class="wire" />

                    <!-- Resistor -->
                    <rect x="110" y="135" width="80" height="30" class="component-box" />
                    <text x="112" y="125" font-weight="bold" font-size="16">R = 1,5 Ом</text>
                    
                    <!-- Voltmeter (Parallel to resistor) -->
                    <path d="M 110 150 L 40 150" class="wire" />
                    <path d="M 190 150 L 260 150" class="wire" />
                    
                    <path d="M 90 150 L 90 190 L 130 190" class="wire" />
                    <path d="M 210 150 L 210 190 L 170 190" class="wire" />
                    <circle cx="90" cy="150" r="3" fill="#000" />
                    <circle cx="210" cy="150" r="3" fill="#000" />
                    
                    <circle cx="150" cy="190" r="20" class="component-box" />
                    <text x="143" y="197" font-weight="900" font-size="16">V</text>
                    
                    <text x="35" y="210" font-weight="900" font-size="18" fill="#1d4ed8">U = 6 В</text>
                </svg>
                
                <button id="toggleBtn" class="mt-8 px-10 py-5 bg-blue-600 text-white rounded-2xl font-black text-xl hover:bg-blue-700 transition transform active:scale-90 shadow-xl border-b-4 border-blue-900">
                    ЗАМКНУТИ КЛЮЧ
                </button>
            </div>

            <!-- Right Side: Ammeter Close-up -->
            <div class="bg-gray-50 rounded-2xl p-6 flex flex-col items-center justify-center border-2 border-gray-200 shadow-inner relative">
                <span class="absolute top-3 right-6 text-sm font-bold text-gray-400 uppercase tracking-widest">Збільшена шкала</span>
                
                <svg viewBox="0 0 200 160" class="w-full h-auto drop-shadow-2xl">
                    <!-- Gauge Frame -->
                    <rect x="5" y="5" width="190" height="150" rx="20" fill="white" stroke="#1e293b" stroke-width="3" />
                    
                    <!-- Darker base -->
                    <path d="M 60 140 A 40 40 0 0 1 140 140 L 140 155 L 60 155 Z" fill="#334155" />
                    
                    <!-- Scale Marks -->
                    <g id="scale"></g>
                    
                    <!-- Labels -->
                    <text x="35" y="125" font-size="12" font-weight="bold" text-anchor="middle">0</text>
                    <text x="165" y="125" font-size="12" font-weight="bold" text-anchor="middle">5</text>
                    <text x="100" y="80" font-size="28" font-weight="900" text-anchor="middle" fill="#1e293b">A</text>

                    <!-- Needle -->
                    <line id="needle" x1="100" y1="140" x2="100" y2="40" stroke="#dc2626" stroke-width="4" stroke-linecap="round" class="needle" style="transform: rotate(-55deg);" />
                    <circle cx="100" cy="140" r="10" fill="#0f172a" />
                </svg>
            </div>
        </div>

        <!-- Problem Details & Inputs -->
        <div id="quizSection" class="bg-blue-50 rounded-3xl p-6 sm:p-8 border-2 border-blue-100">
            <p class="text-xl sm:text-2xl text-gray-800 mb-8 leading-relaxed">
                За відомими даними ($U = 6\text{ В}$, $R = 1,5\text{ Ом}$), 
                визначте характеристики приладу при замкненому колі:
            </p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-3">
                    <label class="block text-lg font-bold text-gray-600">Сила струму в колі ($I$), А:</label>
                    <input type="number" id="inputI" placeholder="Введіть число" class="w-full px-6 py-4 border-3 border-gray-300 rounded-2xl focus:ring-4 focus:ring-blue-400 focus:border-blue-500 outline-none transition text-center font-bold">
                </div>
                <div class="space-y-3">
                    <label class="block text-lg font-bold text-gray-600">Ціна поділки ($C$), А/под:</label>
                    <input type="number" step="0.1" id="inputC" placeholder="Введіть число" class="w-full px-6 py-4 border-3 border-gray-300 rounded-2xl focus:ring-4 focus:ring-blue-400 focus:border-blue-500 outline-none transition text-center font-bold">
                </div>
            </div>

            <div class="mt-10 flex flex-col items-center">
                <button id="checkBtn" class="w-full max-w-md px-10 py-6 bg-green-600 text-white rounded-2xl font-black text-2xl hover:bg-green-700 transition transform active:scale-95 shadow-xl border-b-4 border-green-900">
                    ПЕРЕВІРИТИ
                </button>
                <div id="feedback" class="mt-6 text-2xl text-center font-bold min-h-[40px] px-4"></div>
            </div>
        </div>

        <div class="mt-8 text-gray-400 text-lg text-center font-medium italic">
            Підказка: Скористайтеся законом Ома $I = \frac{U}{R}$
        </div>
    </div>

    <script>
        const switchArm = document.getElementById('switchArm');
        const toggleBtn = document.getElementById('toggleBtn');
        const needle = document.getElementById('needle');
        const scaleGroup = document.getElementById('scale');
        const feedback = document.getElementById('feedback');

        let isClosed = false;
        const totalMarks = 25; 

        function createScale() {
            for (let i = 0; i <= totalMarks; i++) {
                const angle = -55 + (i * (110 / totalMarks));
                const isMajor = i % 5 === 0;
                const length = isMajor ? 20 : 12;
                const x1 = 100 + 85 * Math.sin(angle * Math.PI / 180);
                const y1 = 140 - 85 * Math.cos(angle * Math.PI / 180);
                const x2 = 100 + (85 - length) * Math.sin(angle * Math.PI / 180);
                const y2 = 140 - (85 - length) * Math.cos(angle * Math.PI / 180);

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x1);
                line.setAttribute("y1", y1);
                line.setAttribute("x2", x2);
                line.setAttribute("y2", y2);
                line.setAttribute("class", isMajor ? "scale-mark-long" : "scale-mark");
                scaleGroup.appendChild(line);
            }
        }

        createScale();

        toggleBtn.addEventListener('click', () => {
            isClosed = !isClosed;
            if (isClosed) {
                switchArm.style.transform = "rotate(35deg)";
                toggleBtn.innerText = "РОЗІМКНУТИ КЛЮЧ";
                toggleBtn.classList.replace('bg-blue-600', 'bg-red-600');
                toggleBtn.classList.replace('border-blue-900', 'border-red-900');
                needle.style.transform = "rotate(33deg)"; 
            } else {
                switchArm.style.transform = "rotate(0deg)";
                toggleBtn.innerText = "ЗАМКНУТИ КЛЮЧ";
                toggleBtn.classList.replace('bg-red-600', 'bg-blue-600');
                toggleBtn.classList.replace('border-red-900', 'border-blue-900');
                needle.style.transform = "rotate(-55deg)";
            }
        });

        document.getElementById('checkBtn').addEventListener('click', () => {
            const userI = parseFloat(document.getElementById('inputI').value);
            const userC = parseFloat(document.getElementById('inputC').value);

            if (isNaN(userI) || isNaN(userC)) {
                feedback.innerText = "Будь ласка, введіть обидва числа!";
                feedback.className = "mt-6 text-2xl text-orange-500 text-center font-bold";
                return;
            }

            if (Math.abs(userI - 4) < 0.1 && Math.abs(userC - 0.2) < 0.01) {
                feedback.innerText = "ВІРНО! 🎉 I = 4 А, Ціна поділки = 0,2 А/под.";
                feedback.className = "mt-6 text-2xl text-green-600 text-center font-bold animate-bounce";
            } else {
                let msg = "Спробуйте ще раз! ❌ ";
                if (Math.abs(userI - 4) > 0.1) msg += "Струм I = U / R. ";
                if (Math.abs(userC - 0.2) > 0.01) msg += "Ціна поділки = (1-0)/5 поділ.";
                feedback.innerText = msg;
                feedback.className = "mt-6 text-2xl text-red-600 text-center font-bold";
            }
        });
    </script>
</body>
</html>
