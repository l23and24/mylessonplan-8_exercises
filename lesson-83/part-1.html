<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фізика: Виведення формул</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .var {
            font-style: italic;
            font-family: 'Georgia', serif;
        }

        .formula-card {
            background: rgba(255, 255, 255, 0.95);
            color: #1e293b;
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            line-height: 1;
            margin: 0 6px;
        }

        .num { border-bottom: 2px solid #1e293b; padding-bottom: 1px; }
        .den { padding-top: 1px; }

        .step-hidden { opacity: 0; transform: translateY(15px); pointer-events: none; }
        .step-visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .bracket-left {
            border-right: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid rgba(255,255,255,0.3);
            border-bottom: 3px solid rgba(255,255,255,0.3);
            width: 20px;
            height: 140px;
            border-radius: 0 12px 12px 0;
        }
        .bracket-right {
            border-left: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid rgba(255,255,255,0.3);
            border-bottom: 3px solid rgba(255,255,255,0.3);
            width: 20px;
            height: 100%;
            border-radius: 12px 0 0 12px;
        }
        .line-conn { height: 3px; background-color: rgba(255,255,255,0.3); width: 30px; }

        .result-block {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            min-width: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: white;
            transition: all 0.4s ease;
        }
        .result-block .num { border-color: white; }

        .main-equality {
            background: #2563eb;
            color: white;
            padding: 1.5rem;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .main-equality .num { border-color: white; }

        .hidden-answer { visibility: hidden; }
        .visible-answer { visibility: visible; }

        .nav-panel {
            position: absolute;
            bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
        }
        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-weight: bold;
            transition: all 0.2s;
        }
        .nav-btn:hover:not(.disabled) { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .nav-btn.disabled { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body class="relative">

    <div class="particles"></div>

    <div class="absolute top-6 text-white/40 font-mono tracking-widest uppercase text-xs">
        Крок <span id="step-counter" class="text-white text-lg font-bold">1</span> / 13
    </div>

    <div class="z-10 flex items-center justify-center w-full max-w-6xl px-4 h-[80vh]">
        
        <!-- Початкові формули -->
        <div id="step-1" class="flex flex-col space-y-8">
            <div class="formula-card text-3xl">
                <span class="var">R</span>&nbsp;=&nbsp;
                <div class="fraction">
                    <span class="num"><span class="var">ρ</span><span class="var">l</span></span>
                    <span class="den"><span class="var">S</span></span>
                </div>
            </div>
            <div class="formula-card text-3xl">
                <span class="var">R</span>&nbsp;=&nbsp;
                <div class="fraction">
                    <span class="num"><span class="var">U</span></span>
                    <span class="den"><span class="var">I</span></span>
                </div>
            </div>
        </div>

        <!-- Поєднання -->
        <div id="step-2" class="flex items-center step-hidden mx-1">
            <div class="bracket-left"></div>
            <div class="line-conn"></div>
            <div class="formula-card main-equality text-4xl shadow-2xl">
                <div class="fraction">
                    <span class="num"><span class="var">U</span></span>
                    <span class="den"><span class="var">I</span></span>
                </div>
                <span class="mx-4 text-white/80">=</span>
                <div class="fraction">
                    <span class="num"><span class="var">ρ</span><span class="var">l</span></span>
                    <span class="den"><span class="var">S</span></span>
                </div>
            </div>
        </div>

        <!-- Висновок -->
        <div id="step-3" class="flex items-center self-stretch py-12 step-hidden mx-1">
            <div class="line-conn"></div>
            <div class="bracket-right"></div>
        </div>

        <!-- Виведені формули з кроками -->
        <div class="flex flex-col space-y-2">
            <!-- U -->
            <div id="step-4" class="result-block step-hidden">
                <span class="var">U</span>&nbsp;=&nbsp;
                <span id="ans-4" class="hidden-answer">
                    <div class="fraction text-xl">
                        <span class="num"><span class="var">I</span> <span class="var">ρ</span> <span class="var">l</span></span>
                        <span class="den"><span class="var">S</span></span>
                    </div>
                </span>
            </div>
            <!-- I -->
            <div id="step-6" class="result-block step-hidden">
                <span class="var">I</span>&nbsp;=&nbsp;
                <span id="ans-6" class="hidden-answer">
                    <div class="fraction text-xl">
                        <span class="num"><span class="var">U</span> <span class="var">S</span></span>
                        <span class="den"><span class="var">ρ</span> <span class="var">l</span></span>
                    </div>
                </span>
            </div>
            <!-- rho -->
            <div id="step-8" class="result-block step-hidden">
                <span class="var">ρ</span>&nbsp;=&nbsp;
                <span id="ans-8" class="hidden-answer">
                    <div class="fraction text-xl">
                        <span class="num"><span class="var">U</span> <span class="var">S</span></span>
                        <span class="den"><span class="var">I</span> <span class="var">l</span></span>
                    </div>
                </span>
            </div>
            <!-- l -->
            <div id="step-10" class="result-block step-hidden">
                <span class="var">l</span>&nbsp;=&nbsp;
                <span id="ans-10" class="hidden-answer">
                    <div class="fraction text-xl">
                        <span class="num"><span class="var">U</span> <span class="var">S</span></span>
                        <span class="den"><span class="var">I</span> <span class="var">ρ</span></span>
                    </div>
                </span>
            </div>
            <!-- S -->
            <div id="step-12" class="result-block step-hidden">
                <span class="var">S</span>&nbsp;=&nbsp;
                <span id="ans-12" class="hidden-answer">
                    <div class="fraction text-xl">
                        <span class="num"><span class="var">I</span> <span class="var">ρ</span> <span class="var">l</span></span>
                        <span class="den"><span class="var">U</span></span>
                    </div>
                </span>
            </div>
        </div>
    </div>

    <div class="nav-panel">
        <button id="prev" class="nav-btn">← НАЗАД</button>
        <button id="next" class="nav-btn bg-white !text-slate-900 shadow-lg">ДАЛІ →</button>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 13;

        const updateUI = () => {
            document.getElementById('step-counter').innerText = currentStep;

            // Логіка показу великих блоків
            [2, 3, 4, 6, 8, 10, 12].forEach(id => {
                const el = document.getElementById('step-' + id);
                if (el) {
                    if (currentStep >= id) {
                        el.classList.remove('step-hidden');
                        el.classList.add('step-visible');
                    } else {
                        el.classList.add('step-hidden');
                        el.classList.remove('step-visible');
                    }
                }
            });

            // Логіка показу відповідей (праві частини)
            [5, 7, 9, 11, 13].forEach(stepId => {
                const ansId = 'ans-' + (stepId - 1);
                const el = document.getElementById(ansId);
                if (el) {
                    if (currentStep >= stepId) {
                        el.classList.remove('hidden-answer');
                        el.classList.add('visible-answer');
                    } else {
                        el.classList.add('hidden-answer');
                        el.classList.remove('visible-answer');
                    }
                }
            });

            document.getElementById('prev').classList.toggle('disabled', currentStep === 1);
            document.getElementById('next').classList.toggle('disabled', currentStep === totalSteps);
        };

        const next = () => { if (currentStep < totalSteps) { currentStep++; updateUI(); } };
        const prev = () => { if (currentStep > 1) { currentStep--; updateUI(); } };

        document.getElementById('next').onclick = next;
        document.getElementById('prev').onclick = prev;

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') next();
            if (e.key === 'ArrowLeft') prev();
        });

        updateUI();
    </script>
</body>
</html>
