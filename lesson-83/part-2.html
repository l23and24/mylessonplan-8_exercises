<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фізика: Таблиця розрахунків (Заокруглення до десятих)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
        }

        table {
            border-collapse: separate;
            border-spacing: 0 8px;
            width: 100%;
        }

        th {
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            font-weight: 600;
            padding: 0.75rem;
            text-align: center;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        td {
            padding: 0.6rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
        }

        td:first-child { border-radius: 10px 0 0 10px; }
        td:last-child { border-radius: 0 10px 10px 0; }

        .var {
            font-style: italic;
            font-family: 'Georgia', serif;
        }

        .var-input {
            background: white;
            color: #1e293b;
            border-radius: 6px;
            width: 100px;
            padding: 0.4rem;
            text-align: center;
            font-weight: bold;
            border: 2px solid transparent;
            transition: all 0.2s;
            font-size: 1.1rem;
        }

        .var-input.correct {
            background: #22c55e;
            color: white;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
        }

        .var-input.wrong {
            background: #ef4444;
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }

        .var-display {
            font-size: 1.2rem;
            font-weight: 500;
        }

        .hint-btn {
            cursor: pointer;
            font-size: 1.4rem;
            filter: drop-shadow(0 0 3px gold);
            transition: transform 0.2s;
            margin-left: 8px;
        }

        .hint-btn:hover { transform: scale(1.2) rotate(15deg); }

        #hint-overlay {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #1e293b;
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 0 100px rgba(0,0,0,0.6);
            z-index: 100;
            text-align: center;
            width: 350px;
        }

        .fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            line-height: 1;
            margin: 0 4px;
        }

        .num { border-bottom: 2px solid #1e293b; padding-bottom: 2px; }
        .den { padding-top: 2px; }
        
        .overlay-bg {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 90;
        }

        .refresh-btn {
            background: #2563eb;
            color: white;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 1.5rem;
            align-self: center;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .refresh-btn:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body>

    <div class="table-container">
        <h1 class="text-xl md:text-2xl font-bold text-center mb-2 text-white tracking-wide">
            Фізика: Розрахунок параметрів провідника
        </h1>
        <p class="text-slate-300 text-center mb-6 text-sm">
            Примітка: Результати обчислень заокруглюйте до <b>десятих</b> (один знак після коми).
        </p>
        
        <div class="overflow-x-auto">
            <table>
                <thead>
                    <tr>
                        <th><span class="var">U</span> (В)</th>
                        <th><span class="var">I</span> (А)</th>
                        <th><span class="var">ρ</span> (Ом·мм²/м)</th>
                        <th><span class="var">l</span> (м)</th>
                        <th><span class="var">S</span> (мм²)</th>
                    </tr>
                </thead>
                <tbody id="exercise-body">
                    <!-- JS Rows -->
                </tbody>
            </table>
        </div>

        <button onclick="generateTable()" class="refresh-btn">
            Згенерувати нові завдання
        </button>
    </div>

    <div id="overlay-bg" class="overlay-bg" onclick="closeHint()"></div>
    <div id="hint-overlay">
        <h3 class="text-lg font-bold mb-3">Формула для розрахунку:</h3>
        <div id="hint-formula" class="text-3xl py-4"></div>
        <button onclick="closeHint()" class="mt-2 bg-slate-800 text-white px-6 py-2 rounded-lg text-sm font-semibold">Зрозумів</button>
    </div>

    <script>
        const formulas = {
            u: `<span class="var">U</span> = <div class="fraction"><span class="num"><span class="var">I</span> <span class="var">ρ</span> <span class="var">l</span></span><span class="den"><span class="var">S</span></span></div>`,
            i: `<span class="var">I</span> = <div class="fraction"><span class="num"><span class="var">U</span> <span class="var">S</span></span><span class="den"><span class="var">ρ</span> <span class="var">l</span></span></div>`,
            rho: `<span class="var">ρ</span> = <div class="fraction"><span class="num"><span class="var">U</span> <span class="var">S</span></span><span class="den"><span class="var">I</span> <span class="var">l</span></span></div>`,
            l: `<span class="var">l</span> = <div class="fraction"><span class="num"><span class="var">U</span> <span class="var">S</span></span><span class="den"><span class="var">I</span> <span class="var">ρ</span></span></div>`,
            s: `<span class="var">S</span> = <div class="fraction"><span class="num"><span class="var">I</span> <span class="var">ρ</span> <span class="var">l</span></span><span class="den"><span class="var">U</span></span></div>`
        };

        const resistivityValues = [0.017, 0.028, 0.1, 0.4, 0.5, 1.1];

        function createScenario(targetVar) {
            let u, i, rho, l, s;
            
            // Випадкові дані
            rho = resistivityValues[Math.floor(Math.random() * resistivityValues.length)];
            s = (Math.random() * 3 + 0.5).toFixed(1); // 0.5 - 3.5
            l = (Math.floor(Math.random() * 15) + 1) * 10; // 10, 20... 150
            i = (Math.random() * 4 + 0.5).toFixed(1); // 0.5 - 4.5
            
            // Базовий розрахунок U для створення збалансованого рядка
            u = (parseFloat(i) * rho * parseFloat(l)) / parseFloat(s);
            u = parseFloat(u.toFixed(1));

            const scenario = { 
                u: parseFloat(u), 
                i: parseFloat(i), 
                rho: rho, 
                l: parseInt(l), 
                s: parseFloat(s), 
                missing: targetVar 
            };
            
            // Розраховуємо ТОЧНУ відповідь, яку потім треба заокруглити до десятих
            scenario.correctRounded = calculateAndRound(scenario);
            return scenario;
        }

        function calculateAndRound(scen) {
            let res;
            switch(scen.missing) {
                case 'u': res = (scen.i * scen.rho * scen.l) / scen.s; break;
                case 'i': res = (scen.u * scen.s) / (scen.rho * scen.l); break;
                case 'rho': res = (scen.u * scen.s) / (scen.i * scen.l); break;
                case 'l': res = (scen.u * scen.s) / (scen.i * scen.rho); break;
                case 's': res = (scen.i * scen.rho * scen.l) / scen.u; break;
            }
            // Заокруглення до десятих (один знак після коми) за математичними правилами
            return Math.round(res * 10) / 10;
        }

        function checkAnswer(input, correct) {
            const val = parseFloat(input.value.replace(',', '.'));
            
            if (isNaN(val)) {
                input.classList.remove('correct', 'wrong');
                return;
            }
            
            // Порівнюємо введене значення із заокругленим правильним
            if (val === correct) {
                input.classList.add('correct');
                input.classList.remove('wrong');
            } else {
                input.classList.add('wrong');
                input.classList.remove('correct');
            }
        }

        function showHint(key) {
            document.getElementById('hint-formula').innerHTML = formulas[key];
            document.getElementById('hint-overlay').style.display = 'block';
            document.getElementById('overlay-bg').style.display = 'block';
        }

        function closeHint() {
            document.getElementById('hint-overlay').style.display = 'none';
            document.getElementById('overlay-bg').style.display = 'none';
        }

        function generateTable() {
            const container = document.getElementById('exercise-body');
            container.innerHTML = '';
            const vars = ['u', 'i', 'rho', 'l', 's'];
            
            vars.forEach(v => {
                const scen = createScenario(v);
                const tr = document.createElement('tr');
                
                vars.forEach(col => {
                    const td = document.createElement('td');
                    if (scen.missing === col) {
                        td.innerHTML = `
                            <div class="flex items-center justify-center">
                                <input type="text" class="var-input" placeholder="0.0" 
                                    oninput="checkAnswer(this, ${scen.correctRounded})">
                                <span class="hint-btn" onclick="showHint('${col}')">💡</span>
                            </div>
                        `;
                    } else {
                        td.innerHTML = `<span class="var-display var">${scen[col]}</span>`;
                    }
                    tr.appendChild(td);
                });
                container.appendChild(tr);
            });
        }

        window.onload = generateTable;
    </script>
</body>
</html>
