<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фізика: Таблиця розрахунків</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            /* Прокрутка дозволена для випадків масштабування */
            overflow-y: auto; 
        }

        .table-container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
        }

        table {
            border-collapse: separate;
            border-spacing: 0 8px;
            width: 100%;
        }

        th {
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            font-weight: 600;
            padding: 0.75rem;
            text-align: center;
            border-radius: 8px;
            font-size: 0.9rem;
            text-transform: none;
        }

        td {
            padding: 0.6rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
        }

        td:first-child { border-radius: 10px 0 0 10px; }
        td:last-child { border-radius: 0 10px 10px 0; }

        /* Курсив для фізичних величин */
        .var {
            font-style: italic;
            font-family: 'Georgia', serif;
        }

        .var-input {
            background: white;
            color: #1e293b;
            border-radius: 6px;
            width: 90px;
            padding: 0.4rem;
            text-align: center;
            font-weight: bold;
            border: 2px solid transparent;
            transition: all 0.2s;
            font-size: 1.1rem;
        }

        .var-input.correct {
            background: #22c55e;
            color: white;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
        }

        .var-input.wrong {
            background: #ef4444;
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }

        .var-display {
            font-size: 1.2rem;
            font-weight: 500;
        }

        .hint-btn {
            cursor: pointer;
            font-size: 1.4rem;
            filter: drop-shadow(0 0 3px gold);
            transition: transform 0.2s;
            margin-left: 8px;
        }

        .hint-btn:hover { transform: scale(1.2) rotate(15deg); }

        /* Стиль підказки */
        #hint-overlay {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #1e293b;
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 0 100px rgba(0,0,0,0.6);
            z-index: 100;
            text-align: center;
            width: 350px;
        }

        .fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            line-height: 1;
            margin: 0 4px;
        }

        .num { border-bottom: 2px solid #1e293b; padding-bottom: 2px; }
        .den { padding-top: 2px; }
        
        .overlay-bg {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 90;
        }

        .refresh-btn {
            background: white;
            color: #0f172a;
            padding: 0.6rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 1.5rem;
            align-self: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .refresh-btn:hover { background: #e2e8f0; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="table-container">
        <h1 class="text-xl md:text-2xl font-bold text-center mb-6 text-white tracking-wide">
            Тренажер: Розрахунок параметрів провідника
        </h1>
        
        <div class="overflow-x-auto">
            <table>
                <thead>
                    <tr>
                        <th><span class="var">U</span> (В)</th>
                        <th><span class="var">I</span> (А)</th>
                        <th><span class="var">ρ</span> (Ом·мм²/м)</th>
                        <th><span class="var">l</span> (м)</th>
                        <th><span class="var">S</span> (мм²)</th>
                    </tr>
                </thead>
                <tbody id="exercise-body">
                    <!-- JS Rows -->
                </tbody>
            </table>
        </div>

        <button onclick="location.reload()" class="refresh-btn">
            ОНОВИТИ ЗАВДАННЯ
        </button>
    </div>

    <!-- Модальне вікно -->
    <div id="overlay-bg" class="overlay-bg" onclick="closeHint()"></div>
    <div id="hint-overlay">
        <h3 class="text-lg font-bold mb-3">Тобі знадобиться формула:</h3>
        <div id="hint-formula" class="text-3xl py-4"></div>
        <button onclick="closeHint()" class="mt-2 bg-slate-800 text-white px-6 py-2 rounded-lg text-sm font-semibold">Зрозумів</button>
    </div>

    <script>
        // Сценарії (rho l S I U)
        const scenarios = [
            { u: 12,   i: 2,   rho: 0.1,   l: 120,  s: 2,    missing: 'u' },
            { u: 220,  i: null,rho: 0.017, l: 100,  s: 1.5,  missing: 'i' },
            { u: 4.5,  i: 0.5, rho: null,  l: 10,   s: 0.5,  missing: 'rho' },
            { u: 10,   i: 1,   rho: 0.5,   l: null, s: 2,    missing: 'l' },
            { u: 36,   i: 3,   rho: 0.028, l: 50,   s: null, missing: 's' }
        ];

        // Формули з коректними символами
        const formulas = {
            u: `<span class="var">U</span> = <div class="fraction"><span class="num"><span class="var">I</span> <span class="var">ρ</span> <span class="var">l</span></span><span class="den"><span class="var">S</span></span></div>`,
            i: `<span class="var">I</span> = <div class="fraction"><span class="num"><span class="var">U</span> <span class="var">S</span></span><span class="den"><span class="var">ρ</span> <span class="var">l</span></span></div>`,
            rho: `<span class="var">ρ</span> = <div class="fraction"><span class="num"><span class="var">U</span> <span class="var">S</span></span><span class="den"><span class="var">I</span> <span class="var">l</span></span></div>`,
            l: `<span class="var">l</span> = <div class="fraction"><span class="num"><span class="var">U</span> <span class="var">S</span></span><span class="den"><span class="var">I</span> <span class="var">ρ</span></span></div>`,
            s: `<span class="var">S</span> = <div class="fraction"><span class="num"><span class="var">I</span> <span class="var">ρ</span> <span class="var">l</span></span><span class="den"><span class="var">U</span></span></div>`
        };

        function calculateMissing(s) {
            if (s.missing === 'u') return (s.i * s.rho * s.l) / s.s;
            if (s.missing === 'i') return (s.u * s.s) / (s.rho * s.l);
            if (s.missing === 'rho') return (s.u * s.s) / (s.i * s.l);
            if (s.missing === 'l') return (s.u * s.s) / (s.i * s.rho);
            if (s.missing === 's') return (s.i * s.rho * s.l) / s.u;
        }

        function showHint(key) {
            document.getElementById('hint-formula').innerHTML = formulas[key];
            document.getElementById('hint-overlay').style.display = 'block';
            document.getElementById('overlay-bg').style.display = 'block';
        }

        function closeHint() {
            document.getElementById('hint-overlay').style.display = 'none';
            document.getElementById('overlay-bg').style.display = 'none';
        }

        function checkAnswer(input, correct) {
            const val = parseFloat(input.value.replace(',', '.'));
            if (isNaN(val)) {
                input.classList.remove('correct', 'wrong');
                return;
            }
            // Точність 5%
            const threshold = correct * 0.05 || 0.1;
            if (Math.abs(val - correct) < threshold) {
                input.classList.add('correct');
                input.classList.remove('wrong');
            } else {
                input.classList.add('wrong');
                input.classList.remove('correct');
            }
        }

        function initTable() {
            const container = document.getElementById('exercise-body');
            scenarios.forEach((s) => {
                const tr = document.createElement('tr');
                const answer = calculateMissing(s);
                const cols = ['u', 'i', 'rho', 'l', 's'];
                
                cols.forEach(col => {
                    const td = document.createElement('td');
                    if (s.missing === col) {
                        td.innerHTML = `
                            <div class="flex items-center justify-center">
                                <input type="text" class="var-input" placeholder="?" oninput="checkAnswer(this, ${answer})">
                                <span class="hint-btn" onclick="showHint('${col}')">💡</span>
                            </div>
                        `;
                    } else {
                        td.innerHTML = `<span class="var-display var">${s[col]}</span>`;
                    }
                    tr.appendChild(td);
                });
                container.appendChild(tr);
            });
        }

        window.onload = initTable;
    </script>
</body>
</html>
