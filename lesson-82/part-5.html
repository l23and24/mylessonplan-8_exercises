<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Залежність опору від матеріалу</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: manipulation;
            user-select: none;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            height: 350px;
            background: #fff;
            border-radius: 16px;
            box-shadow: inset 0 2px 12px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 2px solid #e2e8f0;
        }
        canvas {
            display: block;
        }
        .control-panel {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .material-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 160px;
            min-height: 60px;
            font-size: 1.25rem;
        }
        .material-btn:active {
            transform: scale(0.95);
        }
        .material-btn.active {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-slate-800 mb-3 tracking-tight">Дослідження опору провідника</h1>
            <p class="text-xl text-slate-500 font-medium italic">«Опір провідника залежить від речовини, з якої він виготовлений»</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
            <!-- Інформаційні табло -->
            <div class="bg-blue-600 p-6 rounded-2xl shadow-lg flex flex-col justify-center items-center text-white">
                <span class="text-xs uppercase tracking-widest opacity-80 mb-1 font-bold">Довжина (l)</span>
                <span class="text-4xl font-bold">1 м</span>
            </div>
            <div class="bg-blue-500 p-6 rounded-2xl shadow-lg flex flex-col justify-center items-center text-white">
                <span class="text-xs uppercase tracking-widest opacity-80 mb-1 font-bold">Переріз (S)</span>
                <span class="text-4xl font-bold">0,2 мм²</span>
            </div>
            <div class="bg-orange-500 p-6 rounded-2xl shadow-lg flex flex-col justify-center items-center text-white">
                <span class="text-xs uppercase tracking-widest opacity-80 mb-1 font-bold">Опір (R)</span>
                <span id="resistance-display" class="text-4xl font-black">0,017 Ом</span>
            </div>
        </div>

        <div class="control-panel">
            <div class="mb-8">
                <div class="flex flex-wrap justify-center gap-6">
                    <button onclick="setMaterial('copper')" id="btn-copper" class="material-btn active bg-orange-400 hover:bg-orange-500 text-white rounded-2xl font-bold shadow-md">Мідь</button>
                    <button onclick="setMaterial('iron')" id="btn-iron" class="material-btn bg-slate-400 hover:bg-slate-500 text-white rounded-2xl font-bold shadow-md">Залізо</button>
                    <button onclick="setMaterial('nichrome')" id="btn-nichrome" class="material-btn bg-zinc-700 hover:bg-zinc-800 text-white rounded-2xl font-bold shadow-md">Ніхром</button>
                </div>
            </div>

            <div class="canvas-container mb-6" id="container">
                <canvas id="simCanvas"></canvas>
            </div>

            <div class="bg-blue-50 p-6 rounded-xl text-lg text-blue-900 border-l-8 border-blue-400">
                <p><strong>Пояснення для учнів:</strong> Чим щільніша кристалічна ґратка і чим більші іони, тим важче електронам пробитися крізь метал. Це і створює електричний опір.</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('container');
        const resistanceDisplay = document.getElementById('resistance-display');

        let width, height;
        let animationFrame;

        const materials = {
            copper: {
                resistance: 0.085,
                ionSpacing: 80,
                electronSpeed: 3.5,
                obstacleRadius: 10,
                jitter: 0.1
            },
            iron: {
                resistance: 0.5,
                ionSpacing: 55,
                electronSpeed: 2.2,
                obstacleRadius: 13,
                jitter: 0.3
            },
            nichrome: {
                resistance: 5.5,
                ionSpacing: 42, // Трохи більше місця для проходу
                electronSpeed: 1.2,
                obstacleRadius: 16,
                jitter: 0.6 // Більше випадкових відхилень, щоб обходити перешкоди
            }
        };

        let currentMaterial = materials.copper;
        let electrons = [];
        let ions = [];

        function resize() {
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width;
            canvas.height = height;
            initIons();
            initElectrons();
        }

        function initIons() {
            ions = [];
            const spacing = currentMaterial.ionSpacing;
            // Центруємо ґратку для естетики
            const offsetX = (width % spacing) / 2;
            const offsetY = (height % spacing) / 2;
            
            for (let x = offsetX + spacing/2; x < width; x += spacing) {
                for (let y = offsetY + spacing/2; y < height; y += spacing) {
                    ions.push({ x, y });
                }
            }
        }

        function initElectrons() {
            electrons = [];
            for (let i = 0; i < 35; i++) {
                electrons.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: currentMaterial.electronSpeed + Math.random(),
                    vy: (Math.random() - 0.5) * 2
                });
            }
        }

        function setMaterial(key) {
            currentMaterial = materials[key];
            resistanceDisplay.innerText = currentMaterial.resistance + " Ом";
            
            document.querySelectorAll('.material-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-blue-600');
            });
            document.getElementById('btn-' + key).classList.add('active');

            initIons();
            initElectrons();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Фон провідника
            ctx.fillStyle = "#f1f5f9";
            ctx.fillRect(0, 0, width, height);

            // Малюємо іони
            ions.forEach(ion => {
                ctx.beginPath();
                ctx.arc(ion.x, ion.y, currentMaterial.obstacleRadius, 0, Math.PI * 2);
                ctx.fillStyle = "#ff4d4d";
                ctx.fill();
                ctx.strokeStyle = "#990000";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("+", ion.x, ion.y);
            });

            // Малюємо та оновлюємо електрони
            electrons.forEach(e => {
                // Додаємо випадковий рух (jitter), щоб електрони не застрягали
                e.vy += (Math.random() - 0.5) * currentMaterial.jitter;
                
                // Обмежуємо вертикальну швидкість
                if (Math.abs(e.vy) > 2) e.vy *= 0.9;

                e.x += e.vx;
                e.y += e.vy;

                // Перевірка зіткнень
                ions.forEach(ion => {
                    const dx = e.x - ion.x;
                    const dy = e.y - ion.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const minDist = currentMaterial.obstacleRadius + 5;
                    
                    if (dist < minDist) {
                        // Відштовхування
                        const angle = Math.atan2(dy, dx);
                        e.vx = Math.cos(angle) * 0.5 + 0.2; // Трохи просуваємо вперед
                        e.vy = Math.sin(angle) * 2;
                        
                        // Корекція позиції, щоб не застрягати всередині іона
                        e.x = ion.x + Math.cos(angle) * minDist;
                        e.y = ion.y + Math.sin(angle) * minDist;
                        
                        // Повернення до базової швидкості через час
                        setTimeout(() => {
                           if (e.vx < currentMaterial.electronSpeed) {
                               e.vx += 0.1;
                           }
                        }, 50);
                    }
                });

                // Повернення до нормальної швидкості просування вправо
                if (e.vx < currentMaterial.electronSpeed) e.vx += 0.05;
                if (e.vx > currentMaterial.electronSpeed * 1.5) e.vx *= 0.95;

                // Циклічність екрану
                if (e.x > width) e.x = 0;
                if (e.x < 0) e.x = width;
                if (e.y > height) e.y = 0;
                if (e.y < 0) e.y = height;

                ctx.beginPath();
                ctx.arc(e.x, e.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = "#2563eb";
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.fillStyle = "white";
                ctx.font = "bold 10px Arial";
                ctx.textAlign = "center";
                ctx.fillText("-", e.x, e.y);
            });

            animationFrame = requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        window.onload = () => {
            resize();
            draw();
            setMaterial('copper');
        };
    </script>
</body>
</html>
