<html lang="uk">
<head>

    <style>
        :root {
            --flower-scale: 1;
        }
        @media (max-width: 768px) {
            :root { --flower-scale: 0.7; }
        }

        body { 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f8fafc; 
            font-family: system-ui, -apple-system, sans-serif; 
        }
        
        .app-grid { 
            display: grid; 
            grid-template-columns: 1.2fr 0.8fr; 
            min-height: 100vh; 
            padding: 15px; 
            gap: 15px; 
        }

        @media (max-width: 1024px) {
            .app-grid {
                grid-template-columns: 1fr;
                height: auto;
            }
        }
        
        .canvas-area { 
            background: #ffffff; 
            border-radius: 24px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9;
            overflow: hidden;
            min-height: 500px;
        }

        .flower-wrapper {
            position: relative;
            width: 100%;
            height: calc(450px * var(--flower-scale)); 
            margin-top: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flower-center-point {
            position: relative;
            width: 1px;
            height: 1px;
        }

        .petal {
            position: absolute;
            width: calc(130px * var(--flower-scale)); 
            height: calc(190px * var(--flower-scale));
            background: #ffffff;
            border: 2px dashed #cbd5e1;
            border-radius: 50% 50% 50% 50% / 75% 75% 25% 25%;
            left: calc(-65px * var(--flower-scale)); 
            bottom: calc(15px * var(--flower-scale)); 
            transform-origin: center bottom;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
